{{ define "main" }}
<p class="meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time></p>
<h1>{{ .Title }}</h1>
{{ .Content }}
<div class="post-nav">
  {{ with .NextInSection }}<a href="{{ .RelPermalink }}">&larr; {{ .Title }}</a>{{ else }}<span></span>{{ end }}
  <a href="{{ .Parent.RelPermalink }}">All entries</a>
</div>
{{ end }}
